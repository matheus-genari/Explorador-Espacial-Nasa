<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorador Espacial - NASA</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>🌌 Explorador Espacial - NASA</h1>
  </header>

  <main>
    <section class="form-section">
      <form id="form-data">

        <!-- CAMPOS DE DATA MELHORADOS -->
        <div class="data-campos">
          <input type="number" id="dia" placeholder="DD" min="1" max="31" required>
          <input type="number" id="mes" placeholder="MM" min="1" max="12" required>
          <input type="number" id="ano" placeholder="AAAA" min="1900" max="2100" required>
        </div>

        <button type="submit">🔭 Buscar</button>
      </form>
    </section>

    <section id="resultado"></section>

    <section class="historico">
      <h2>📋 Histórico de Consultas</h2>
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Título</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-consultas"></tbody>
      </table>
    </section>
  </main>

  <!-- SWEETALERT -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="script/script.js"></script>
</body>
</html>
